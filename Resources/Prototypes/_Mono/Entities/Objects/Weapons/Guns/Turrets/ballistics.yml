# Anti-Chimera Variant

- type: entity
  parent: BallisticTurretHeavyBase
  id: WeaponTurretHeavyRIPBase
  name: heavy ballistic RIP turret
  description: A variant on the standard heavy balistic turret, firing a barrage of 7.62x51mm RIP ammunition to delete anything unarmored. Chimera hate these.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Turrets/heavy_turret_RIP.rsi
    drawdepth: Mobs
    layers:
    - state: syndie_lethal_RIP
  - type: ProjectileBatteryAmmoProvider
    proto: Bullet762x51mmRIP
    fireCost: 25

