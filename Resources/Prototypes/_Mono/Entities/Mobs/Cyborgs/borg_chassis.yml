#PDV Cyborgs

- type: entity
  id: BorgChassisSelectablePDV
  parent: BaseBorgChassisPDV
  name: PDV cyborg
  description: A purpose built cyborg used by the PDV.
  components:
  - type: Sprite
    sprite: _Mono/Mobs/Silicon/PDV/pdvchassis.rsi
    layers:
    - state: empty
      map: ["enum.BorgVisualLayers.Body", "movement"]
    - state: empty_l
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: empty_l
      shader: unshaded
      map: ["light","enum.BorgVisualLayers.LightStatus"]
      visible: false
  - type: BorgChassis
    maxModules: 0
    hasMindState: empty_l
    noMindState: empty_l
  - type: InteractionPopup
    interactSuccessString: petting-success-derelict-cyborg
    interactFailureString: petting-failure-derelict-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: BorgSwitchableType
    typeWhitelist: 
    - pdvassault
    - pdvengineer
    - pdvmedical
    inherentRadioChannels:
    - Common
    - Traffic
    - Freelance

- type: entity
  id: PDVBorgChassisAssault
  parent: BorgChassisSelectable
  name: PDV assault cyborg
  components:
  - type: BorgSwitchableType
    selectedBorgType: pdvassault
  - type: BorgSwitchableSubtype
    borgSubtype: pdvassault_default
  - type: Damageable
    damageContainer: Silicon
    damageModifierSet: FactionBorgChassisAssault

- type: entity
  id: PDVBorgChassisEngineer
  parent: BorgChassisSelectable
  name: PDV engineer cyborg
  components:
  - type: BorgSwitchableType
    selectedBorgType: pdvengineer
  - type: BorgSwitchableSubtype
    borgSubtype: pdvengineer_default

- type: entity
  id: PDVBorgChassisMedical
  parent: BorgChassisSelectable
  name: PDV medical cyborg
  components:
  - type: BorgSwitchableType
    selectedBorgType: pdvmedical
  - type: BorgSwitchableSubtype
    borgSubtype: pdvmedical_default

