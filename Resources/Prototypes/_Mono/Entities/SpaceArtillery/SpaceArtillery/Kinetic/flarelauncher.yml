- type: entity
  id: WeaponTurretFlare
  name: GS-002 Sunny flare system
  parent: BallisticArtilleryUnanchorableMagazine
  description: A relatively small flare flinging hardpoint used to fool heat seeking missiles. Also good for search and rescue.
  components:
  - type: StaticPrice
    price: 750
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/flare.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: AmmoCounter
  - type: WirelessNetworkConnection
    range: 700
  - type: GunSignalControl
  - type: Gun
    fireRate: 3
    recoil: 1
    projectileSpeed: 75
    minAngle: 50
    maxAngle: 300
    burstCooldown: 15
    burstFireRate: 3
    shotsPerBurst: 15
    selectedMode: Burst
    availableModes: Burst
    shootThermalSignature: 10000 # relatively low for a shipgun, ~693m signature if firing continuously - Used because it's harmless.
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rocket_launcher.ogg
    soundEmpty:
      path: /Audio/Weapons/click.ogg
  - type: SpaceArtillery
    powerChargeRate: 50
    powerUsePassive: 75
    powerUseActive: 0
  - type: Actions
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: SunnyMagazine
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - SunnyMagazine
        whitelistFailPopup: gun-magazine-whitelist-fail
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RadarBlip
    radarColor: "#ff9d00"
    scale: 0.7
    visibleFromOtherGrids: true
  - type: ShipGunType
    shipType: Other
  - type: ShipGunClass
    shipClass: Light
  - type: ShipRepairable
    repairTime: 25
    repairCost: 100
