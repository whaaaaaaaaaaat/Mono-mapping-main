- type: entity
  id: SunnyMagazine
  name: "Sunny flare autoloader"
  parent: [BaseItem, RecyclableItemSteelTiny]
  components:
  - type: Tag
    tags:
    - SunnyMagazine
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    proto: SunnyCartridge
    capacity: 30
    mayTransfer: true
    infiniteUnspawned: true
    whitelist:
      tags:
      - SunnyCartridge
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/generic_shipgun_box.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  id: SunnyCartridge
  name: Packaged flare
  description: An individual electronically activated flare for the GS-002 countermeasure system.
  parent: BaseCartridge
  components:
  - type: Tag
    tags:
    - SunnyCartridge
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: ShipSunnyFlare
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/flare_countermeasure.rsi #Behold, flare but yellow.
    layers:
    - state: sunny-flare
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 0.25
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
