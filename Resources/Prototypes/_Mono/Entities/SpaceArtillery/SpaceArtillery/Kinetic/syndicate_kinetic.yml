
# Corporate War Era - Syndicate

# Adder Scattercannon

- type: entity
  id: WeaponTurretAdderScattercannon
  name: Adder scattercannon
  suffix: PDV ONLY, SYN ONLY
  parent: BallisticArtillery
  description: A large, twin-barrelled scatter cannon, firing bursts of canister shot to shred any incoming missiles or potential boarders. Uses a self loading mechanism similar to the anaconda handgun.
  components:
  - type: StaticPrice
    price: 250
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/adder.rsi
    layers:
    - state: space_artillery
  - type: Battery
    maxCharge: 20000
    startingCharge: 20000
  - type: ExaminableBattery
  - type: Appearance
  - type: FireControlRotate
  - type: AutoShootGun
  - type: GunSignalControl
  - type: WirelessNetworkConnection
    range: 700
  - type: DeviceLinkSink
    ports:
    - Toggle
  - type: Gun
    fireRate: 5
    recoil: 10 # 2/5x
    projectileSpeed: 200
    minAngle: 0
    maxAngle: 5
    shootThermalSignature: 10000 # relatively low for a shipgun, ~693m signature if firing continuously
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/slammer.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 550
  - type: SpaceArtillery
    powerChargeRate: 100
    powerUsePassive: 100
  - type: Actions
  - type: CombatMode
    isInCombatMode: true
  - type: Airtight
  - type: ProjectileBatteryAmmoProvider
    proto: AdderSpread
    fireCost: 15
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 7500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RadiationBlocker
    resistance: 8
  - type: RadarBlip
    radarColor: "#FF0000"
    scale: 1
    visibleFromOtherGrids: true
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Light
  - type: ShipRepairable
    repairTime: 10
    repairCost: 30

- type: entity
  id: WeaponTurretFang
  name: Fang heavy 90mm autocannon
  suffix: PDV ONLY, SYN ONLY
  parent: BallisticArtillery
  description: A heavy 90mm autocannon of syndicate design, created during the corporate war. Made for shattering opponent destroyers. Uses a self loading mechanism similar to the anaconda handgun.
  components:
  - type: StaticPrice
    price: 2000
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/fang.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: FireControlRotate
  - type: AmmoCounter
  - type: Battery
    maxCharge: 40000
    startingCharge: 40000
  - type: ExaminableBattery
  - type: WirelessNetworkConnection
    range: 500
  - type: Gun
    fireRate: 2
    recoil: 10 # 2/5x
    projectileSpeed: 170
    minAngle: 0
    maxAngle: 6
    burstCooldown: 2
    burstFireRate: 4
    shotsPerBurst: 4
    selectedMode: Burst
    availableModes: Burst
    shootThermalSignature: 2000000 # ~4.5km signature if firing continuously
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/120mm_mortar.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 125
  - type: SpaceArtillery
    powerChargeRate: 125
    powerUsePassive: 600
    powerUseActive: 0
  - type: Actions
  - type: ProjectileBatteryAmmoProvider
    proto: 90mmBullet
    fireCost: 50
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 12500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RadarBlip
    radarColor: "#FF0000"
    scale: 1.5
    visibleFromOtherGrids: true
    gridConfig:
      color: "#FF0000"
      shape: Square
      respectZoom: true
      rotate: true
      bounds: "-1.5,-1.5,1.5,1.5"
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Medium
  - type: ShipRepairable
    repairTime: 20
    repairCost: 80

