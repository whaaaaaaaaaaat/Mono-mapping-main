- type: entity
  id: VanykMagazine
  name: "Vanyk 150mm HE missile autoloader"
  parent: [BaseItem, RecyclableItemSteelTiny]
  components:
  - type: Tag
    tags:
    - VanykMagazine
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    proto: VanykCartridge
    capacity: 30
    mayTransfer: true
    whitelist:
      tags:
      - VanykCartridge
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/generic_shipgun_box.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  id: VanykCartridge
  name: 150mm HEAT missile
  description: An individual ASM-302 HEAT missile used in the Vanyk.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - VanykCartridge
    - 150mmShell # intentional, silly + interesting hidden feature stemming from funny shared caliber
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: ShipMissileASM302
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Explosives/generic_cartridges.rsi
    layers:
    - state: vanyk
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 6
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
