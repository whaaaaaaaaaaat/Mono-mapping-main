- type: entity
  parent: ClothingHeadHardsuitBase
  id: ClothingHeadHelmetHardsuitM82
  name: M82 helmet
  description: The interchangeable helmet system for the majority of M82 hardsuits. Outfitted with a basic NVG system.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Head/Hardsuits/m82.rsi
  - type: Clothing
    sprite: _Mono/Clothing/Head/Hardsuits/m82.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: NightVision
    flashDurationMultiplier: 3.5
    isEquipment: true
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide

