- type: entity
  parent: [ClothingOuterHardsuitJuggernaut, EnergyShieldClothing, BaseFactionGearTSFT3 ] # Jugger Suit
  id: ClothingOuterHardsuitNfsdExperimental
  name: TSFMC M92-X tacsuit
  description: An experimental modification of the M92 tacsuit for spec-ops units of the TSFMC. Durable, and comes with an integrated soft-shield, but at the cost of insulation and heft.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/tsfmc_experimental.rsi # Mono
  - type: Clothing
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/tsfmc_experimental.rsi # Mono
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head:  ClothingHeadHelmetHardsuitNfsdExperimental
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock
  - type: PressureProtection
    highPressureMultiplier: 0.2
    lowPressureMultiplier: 1000
  - type: FireProtection # Mono
    reduction: 0.6
  - type: ExplosionResistance
    damageCoefficient: 0.4
  - type: Armor # Mono - Armor Value Changes
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.5
        Heat: 0.7
        Radiation: 0.5
        Caustic: 0.8
        Poison: 0.8 # Mono
  - type: ClothingSpeedModifier # Mono - Armor Value Changes
    walkModifier: 0.9
    sprintModifier: 0.6
  - type: FactionClothing
    faction: NanoTrasen
  - type: StaminaDamageResistance # Mono - Stamres
    coefficient: 0.25
  - type: PirateBountyItem # Mono
    id: ClothingOuterHardsuitTacsuitHighValue
  # Mono - Shielding comps
  - type: Blocking
    passiveBlockModifier:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.7
        Heat: 0.7
    activeBlockModifier:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.7
        Heat: 0.7
      flatReductions:
        Heat: 5
        Piercing: 5
    passiveBlockFraction: 0.8
    activeBlockFraction: 0.8
    isClothing: true
  - type: Damageable
    damageContainer: Shield
  - type: Battery
    maxCharge: 100
    startingCharge: 100
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 0.1
  - type: RechargeableBlocking
  - type: UseDelay
    delay: 20

