- type: borgType
  id: pdvassault
  dummyPrototype: PDVBorgChassisAssault
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleSyndicate
    - BorgModuleSyndicateAssault
  defaultModules:
  - BorgModulePDVStandardAssault
  - BorgModulePDVStandardWeapon
  - BorgModuleJetpack
  - BorgModuleTool
  - BorgModuleGPS
  inventoryTemplateId: borgShort
  spriteBodyState: assault
  spriteHasMindState: assault_l
  spriteNoMindState: assault_l
  spriteToggleLightState: assault_l
  petSuccessString: petting-success-engineer-cyborg
  petFailureString: petting-failure-engineer-cyborg

- type: borgType
