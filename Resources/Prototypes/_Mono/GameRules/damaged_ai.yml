- type: entityTable
  id: DamagedAIShipsTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
      - id: UnknownShuttleZenith
      - id: UnknownShuttleWyrm
      - id: UnknownShuttleNebula

- type: entityTable
  id: DamagedAIShipsTableT2
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: UnknownShuttleZenithE
    - id: UnknownShuttleRazorN
    - id: UnknownShuttleWyvern

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleZenith
  components:
  - type: StationEvent
    startAnnouncement: station-event-ai-shuttle-detected
    startAudio:
      path: /Audio/Misc/notice1.ogg
    weight: 2
    maxOccurrences: 4
  - type: GameRule
    minPlayers: 32
  - type: LoadMapRule
    gridPath: /Maps/_Mono/ShuttleEvent/zenith.yml

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleZenithE
  components:
  - type: StationEvent
    startAnnouncement: station-event-ai-shuttle-detected
    startAudio:
      path: /Audio/Misc/notice1.ogg
    weight: 3
    maxOccurrences: 2
  - type: GameRule
    minPlayers: 32
  - type: LoadMapRule
    gridPath: /Maps/_Mono/ShuttleEvent/zenith_e.yml

- type: entity
  parent: BaseRandomShuttleRule
  id: UnknownShuttleNebula
